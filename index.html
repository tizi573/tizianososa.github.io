
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gato Meow</title>

<style>

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#gato{

width:300px;
cursor:pointer;
transition: transform 0.1s;

}

#gato:active{

transform: scaleY(0.8) scaleX(1.1);

}

</style>

</head>

<body>

<img id="gato" src="gato.png">

<audio id="meow" src="meow.mp3"></audio>

<script>

const gato = document.getElementById("gato")
const sonido = document.getElementById("meow")

gato.addEventListener("click", () => {

sonido.currentTime = 0
sonido.play()

})

</script>

</body>

</html>
